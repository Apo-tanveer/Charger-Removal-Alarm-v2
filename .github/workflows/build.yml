name: Build Charger Removal Alarm

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── Windows .exe + Installer ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Windows exe
        run: |
          dotnet publish ChargerRemovalAlarm.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -o publish

      - name: Build Installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          mkdir installer_output
          iscc charger_removal_alarm.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ChargerRemovalAlarm_Windows
          path: installer_output/ChargerRemovalAlarm_Setup.exe

  # ── macOS .app + DMG ─────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build macOS binary
        run: |
          dotnet publish ChargerRemovalAlarm.Mac.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish

      - name: Create .app bundle and DMG
        run: |
          APP="publish/ChargerRemovalAlarm.app"
          MACOS="$APP/Contents/MacOS"
          RESOURCES="$APP/Contents/Resources"
          mkdir -p "$MACOS" "$RESOURCES"
          cp publish/ChargerRemovalAlarm "$MACOS/ChargerRemovalAlarm"
          chmod +x "$MACOS/ChargerRemovalAlarm"
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Charger Removal Alarm</string>
              <key>CFBundleDisplayName</key><string>Charger Removal Alarm</string>
              <key>CFBundleIdentifier</key><string>com.tanveer.chargerremovalalarm</string>
              <key>CFBundleVersion</key><string>1.0</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleExecutable</key><string>ChargerRemovalAlarm</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>LSMinimumSystemVersion</key><string>11.0</string>
          </dict>
          </plist>
          PLIST
          mkdir -p dmg_staging
          cp -r "$APP" dmg_staging/
          ln -sf /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Charger Removal Alarm" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            publish/ChargerRemovalAlarm.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ChargerRemovalAlarm_Mac
          path: publish/ChargerRemovalAlarm.dmg

  # ── Linux .deb package ────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build Linux binary
        run: |
          dotnet publish ChargerRemovalAlarm.Linux.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o publish

      - name: Create .deb package
        run: |
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/local/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          cp publish/ChargerRemovalAlarm deb/usr/local/bin/charger-removal-alarm
          chmod +x deb/usr/local/bin/charger-removal-alarm

          # Desktop entry so it appears in app launcher
          cat > deb/usr/share/applications/charger-removal-alarm.desktop << DESKTOP
          [Desktop Entry]
          Name=Charger Removal Alarm
          Comment=Alerts when charger is disconnected
          Exec=/usr/local/bin/charger-removal-alarm
          Icon=charger-removal-alarm
          Terminal=false
          Type=Application
          Categories=Utility;
          DESKTOP

          # Control file
          cat > deb/DEBIAN/control << CONTROL
          Package: charger-removal-alarm
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Tanveer
          Description: Charger Removal Alarm
           Plays a loud alarm when your charger is disconnected.
           Supports system tray, battery monitoring, and silence button.
          CONTROL

          dpkg-deb --build deb publish/ChargerRemovalAlarm.deb

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: ChargerRemovalAlarm_Linux
          path: publish/ChargerRemovalAlarm.deb

  # ── Create GitHub Release with all 3 files ────────────────────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: "Charger Removal Alarm v1.0.0"
          body: |
            ## Charger Removal Alarm v1.0.0

            Alerts you with a loud alarm when your charger is disconnected.

            ### Downloads
            | Platform | File | Requirements |
            |----------|------|--------------|
            | 🪟 Windows | `ChargerRemovalAlarm_Setup.exe` | Windows 10 or later |
            | 🍎 macOS   | `ChargerRemovalAlarm.dmg`       | macOS 11 or later   |
            | 🐧 Linux   | `ChargerRemovalAlarm.deb`       | Ubuntu/Debian 64-bit |

            **Linux install:**
            ```bash
            sudo dpkg -i ChargerRemovalAlarm.deb
            ```
          files: |
            release/ChargerRemovalAlarm_Setup.exe
            release/ChargerRemovalAlarm.dmg
            release/ChargerRemovalAlarm.deb
          draft: false
          prerelease: false
